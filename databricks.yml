# This is a Databricks asset bundle definition for nyc_taxi_trips_etl.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: nyc_taxi_trips_etl
  uuid: 886f978d-a1c0-4ed6-a00f-44841aa930f7

include:
  - resources/jobs/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: nyctaxi_dev

presets:
  tags:
    project: nyc_taxi_trips_etl

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-cdd467ab-cdba.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://dbc-cdd467ab-cdba.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/tomimas231@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/tomimas231@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: nyctaxi_dev
      schema: prod
